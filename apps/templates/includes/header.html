{% with request.resolver_match.url_name as url_name %}
<div class="topnav">
    <a class="{% if url_name == 'index' %}active{% endif %}"
       href="{% url 'index' %}">Home</a>

    <a class="{% if url_name == 'list_books' %}active{% endif %}"
       href="{% url 'list_books' %}">List Books</a>

    <a class="{% if url_name == 'aboutus' %}active{% endif %}"
       href="{% url 'aboutus' %}">About</a>
</div>
{% endwith %}
