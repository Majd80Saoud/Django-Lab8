{% extends "layouts/base.html" %}

{% block title %} Book List {% endblock %}

{% block content %}

<h2>Search Results</h2>

{% if books %}
    <ul>
    {% for book in books %}
        <li>
            <strong>{{ book.title }}</strong><br>
            Author: {{ book.author }}
        </li>
        <hr>
    {% endfor %}
    </ul>
{% else %}
    <p>No results found</p>
{% endif %}

{% endblock %}
